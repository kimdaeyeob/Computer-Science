     - 1개의 HTML 파일 요청
     - 3개의 이미지 파일 요청

     - 따라서, HTML 파일이 먼저 요청되고, 그 다음에 이미지 파일들이 요청되는 순서로 진행됨
     - 브라우저가 HTML 파일을 파싱하면서 이미지 태그를 발견하고, 그때마다 이미지 파일들을 요청하는 방식으로 작동함 -->
